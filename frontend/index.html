<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>By a Thread</title>
    <meta
      name="description"
      content="Every nine years, King Minos demands a terrible tribute, turning friend against friend. Only one can go free. But don't wait too long--you're never truly alone in a labyrinth."
    />
    <meta name="author" content="Peter Tunstall" />

    <meta property="og:title" content="By a Thread" />
    <meta
      property="og:description"
      content="Every nine years, King Minos demands a terrible tribute, turning friend against friend. Only one can go free. But don't wait too long--you're never truly alone in a labyrinth."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://by-a-thread.de/screenshot.jpg" />
    <meta property="og:url" content="https://by-a-thread.de" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="By a Thread" />
    <meta
      name="twitter:description"
      content="Every nine years, King Minos demands a terrible tribute, turning friend against friend. Only one can go free. But don't wait too long--you're never truly alone in a labyrinth."
    />
    <meta
      name="twitter:image"
      content="https://by-a-thread.de/screenshot.jpg"
    />
    <script src="./js/theme-boot.js"></script>
    <script src="./js/fonts-boot.js"></script>
    <script src="./js/view-boot.js"></script>
    <script type="module" src="./js/trusted-types-boot.js"></script>

    <link rel="icon" href="./favicon.ico" />
    <link
      rel="preload"
      href="./assets/fonts/Neucha-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      as="image"
      href="./screenshot.jpg"
      fetchpriority="high"
    />
    <!-- Keep this order: The stylesheets will be loaded in parallel, and the
    rules applied in the order the files are listed here. -->
    <link rel="stylesheet" href="./css/01-foundation.css" />
    <link rel="stylesheet" href="./css/02-main.css" />
    <link rel="stylesheet" href="./css/03-buttons-nav-motion.css" />
    <link rel="stylesheet" href="./css/04-dialog-contact.css" />
  </head>
  <body>
    <div class="menu-anchor">
      <div class="menu-wrap">
        <menu-toggle-button
          aria-haspopup="true"
          aria-controls="site-menu"
          aria-expanded="false"
          aria-label="Open site menu"
        ></menu-toggle-button>
        <nav
          id="site-menu"
          class="menu-panel"
          aria-label="Site"
          data-menu-panel
          hidden
        >
          <menu-button
            label="STORY"
            icon="story"
            data-open-dialog="dlg-story"
          ></menu-button>
          <menu-button
            label="ABOUT"
            icon="about"
            data-open-dialog="dlg-about"
          ></menu-button>
          <menu-button
            label="INSTRUCTIONS"
            icon="instructions"
            data-open-dialog="dlg-instructions"
          ></menu-button>
          <menu-button
            label="CONTACT"
            icon="contact"
            data-open-dialog="dlg-contact"
          ></menu-button>
          <menu-button
            label="CODE"
            icon="code"
            href="https://github.com/pjtunstall/by-a-thread"
            target="_blank"
            rel="noreferrer"
          ></menu-button>
          <menu-button
            label="NEW MAZE"
            icon="new-maze"
            data-new-maze
            data-menu-close="false"
          ></menu-button>
          <theme-toggle-button data-menu-close="false"></theme-toggle-button>
        </nav>
      </div>
    </div>

    <main>
      <section class="view-home" data-view="home" aria-label="Home">
        <h1 class="hero-title">BY A THREAD</h1>
        <p class="hero-tagline">An Agony in Ten Mazes</p>

        <figure class="hero-image">
          <carousel-arrow-button
            arrow="left"
            data-carousel-prev
            aria-label="Show previous screenshot"
          ></carousel-arrow-button>
          <img
            src="./screenshot.jpg"
            width="800"
            height="439"
            alt="By a Thread game screenshot"
            loading="eager"
            fetchpriority="high"
            decoding="async"
            data-carousel-image
          />
          <carousel-arrow-button
            arrow="right"
            data-carousel-next
            aria-label="Show next screenshot"
          ></carousel-arrow-button>
        </figure>

        <p class="hero-cta">
          <primary-button
            label="ENTER THE LABYRINTH"
            icon="enter-downloads"
            href="/downloads"
          ></primary-button>
        </p>
      </section>

      <section
        class="view-downloads downloads-page"
        data-view="downloads"
        hidden
        inert
        aria-hidden="true"
        aria-label="Downloads"
      >
        <h2 class="hero-title">BY A THREAD</h2>
        <p class="hero-tagline">Choose Your Platform</p>
        <p class="downloads-note">
          For Linux, choose .deb or .rpm if your distro allows.
        </p>
        <nav class="menu-panel downloads-nav" aria-label="Downloads">
          <menu-button
            label="Windows"
            icon="windows"
            data-platform-download="windows"
            data-dialog-target="dlg-download-windows"
          ></menu-button>
          <menu-button
            label="macOS Apple Silicon"
            icon="apple"
            data-platform-download="macos-apple-silicon"
            data-dialog-target="dlg-download-macos-apple-silicon"
          ></menu-button>
          <menu-button
            label="macOS Intel"
            icon="apple"
            data-platform-download="macos-intel"
            data-dialog-target="dlg-download-macos-intel"
          ></menu-button>
          <menu-button
            label="Linux .deb"
            icon="linux"
            data-platform-download="linux-deb"
            data-dialog-target="dlg-download-linux-deb"
          ></menu-button>
          <menu-button
            label="Linux .rpm"
            icon="linux"
            data-platform-download="linux-rpm"
            data-dialog-target="dlg-download-linux-rpm"
          ></menu-button>
          <menu-button
            label="Linux AppImage"
            icon="linux"
            data-platform-download="linux-appimage"
            data-dialog-target="dlg-download-linux-appimage"
          ></menu-button>
        </nav>

        <p class="downloads-back-link">
          <primary-button
            label="BACK TO MAIN PAGE"
            icon="back-home"
            href="/"
          ></primary-button>
        </p>
      </section>
    </main>

    <script type="module" src="./js/pages/index.js"></script>
  </body>
</html>
