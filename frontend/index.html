    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme-preference");
          var resolved =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (_) {}
      })();
    </script>

    <main>
      <div class="menu-wrap">
        <button

          class="btn btn--ghost menu-toggle"
          data-menu-toggle
          aria-haspopup="true"
          aria-controls="site-menu"
          aria-expanded="false"
          aria-label="Open site menu"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            aria-hidden="true"
          >
            <line x1="3" x2="21" y1="6" y2="6" />
            <line x1="3" x2="21" y1="12" y2="12" />
            <line x1="3" x2="21" y1="18" y2="18" />

        </button>
        <nav id="site-menu" class="hero-nav" aria-label="Site" data-menu hidden>

            <menu-card label="STORY">

            </menu-card>
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            data-open-dialog="dlg-about"
          >
            <menu-card label="ABOUT">

                <circle cx="12" cy="12" r="10" />
                <path d="M12 16v-4" />

              </svg>
            </menu-card>
          </button>
          <button
            type="button"
            class="btn btn--ghost"

      <section class="view-home" data-view="home" aria-label="Home">
        <h1 class="hero-title">BY A THREAD</h1>
        <p class="hero-tagline">An Agony in Ten Mazes</p>

        <figure class="hero-image">
          <button
            type="button"
            class="carousel-arrow carousel-arrow--left"
            data-carousel-prev
            aria-label="Show previous screenshot"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
          </button>
          <img
            src="./screenshot.jpg"
            width="800"
            height="439"
            alt="By a Thread game screenshot"
            loading="eager"
            decoding="async"
            data-carousel-image
          />
          <button
            type="button"
            class="carousel-arrow carousel-arrow--right"
            data-carousel-next
            aria-label="Show next screenshot"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              aria-hidden="true"
            >
              <polyline points="9 18 15 12 9 6" />
            </svg>
          </button>
        </figure>

        <p class="hero-cta">
          <a class="btn btn--primary" href="#downloads">

              xmlns="http://www.w3.org/2000/svg"
